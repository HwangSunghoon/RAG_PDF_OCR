apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-ui
  namespace: rag-pdf-ocr
  labels:
    app: rag-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-ui
  template:
    metadata:
      labels:
        app: rag-ui
    spec:
      containers:
        - name: rag-ui
          image: sunghoonhwang/rag-ui:latest  
          imagePullPolicy: Always
          env:
            - name: BACKEND_URL
              value: http://backend-service:8000  
          ports:
            - name: http
              containerPort: 8501                 
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: rag-pdf-ocr
  labels:
    app: rag-ui
spec:
  selector:
    app: rag-ui
  type: LoadBalancer                  # Minikube면 NodePort로 바꿔도 됨
  ports:
    - name: http
      port: 80                        # 클러스터 밖에서 보는 포트
      targetPort: http                # 위 containerPort 이름(http)을 사용
