version: "3.9"

services:
  llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: minicpmv-llama
    command: >
      -m /models/ggml-model-Q4_K_M.gguf
      --mmproj /models/mmproj-model-f16.gguf
      --host 0.0.0.0 --port 8080
      -c 4096
      -ngl 0
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    restart: unless-stopped

  rag-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    environment:
      - HF_TOKEN
      - HF_MODEL=google/flan-t5-base
      - LLM_LOCAL_MODEL=google/flan-t5-base
      - OCR_LANG=kor+eng
      - EMBED_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - CHUNK_SIZE=900
      - CHUNK_OVERLAP=120
      - LLM_HTTP_URL=http://llm:8080   # llama.cpp 서버 주소
    depends_on:
      - llm
    ports:
      - "8000:8000"
    restart: unless-stopped

  rag-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: rag-ui
    environment:
      - BACKEND_URL=http://rag-backend:8000
    depends_on:
      - rag-backend
    ports:
      - "8501:8501"
    restart: unless-stopped
